services:
  - type: web
    name: rep-markets
    runtime: node
    plan: free
    region: singapore
    buildCommand: corepack enable && pnpm install && pnpm build
    startCommand: pnpm exec prisma migrate deploy && pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: rep-markets-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: rep-markets-db
    plan: free
    region: singapore
    databaseName: repmarkets
    user: repmarkets
